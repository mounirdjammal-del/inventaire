<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Inventaire Immobilisations</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#efefed;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --success-bg:#eaf3de;--success-txt:#3b6d11;
  --danger-bg:#fcebeb;--danger-txt:#a32d2d;
  --warn-bg:#faeeda;--warn-txt:#854f0b;
  --info-bg:#e6f1fb;--info-txt:#185fa5;
  --radius:10px;--radius-lg:14px;
  --touch:48px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#1c1c1e;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --success-bg:#1a2e0f;--success-txt:#8bc34a;
  --danger-bg:#2e1212;--danger-txt:#e57373;
  --warn-bg:#2e2010;--warn-txt:#ffb74d;
  --info-bg:#0e2a42;--info-txt:#64b5f6;
}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg3);color:var(--text);font-size:15px}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:10}
.logo{font-size:16px;font-weight:700;color:var(--text);white-space:nowrap}
.logo span{color:var(--text2);font-weight:400}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{flex:1;display:flex;overflow:hidden}
.sidebar{width:300px;flex-shrink:0;background:var(--bg);border-right:0.5px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;transition:transform .25s ease}
.sidebar-inner{padding:16px;flex:1}
.main{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.btn{min-height:var(--touch);background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:0 16px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;color:var(--text);transition:background .12s;white-space:nowrap;border:none;box-shadow:0 1px 2px rgba(0,0,0,0.05)}
.user-badge{background:var(--info-bg);color:var(--info-txt);border-radius:20px;padding:5px 12px;font-size:13px;display:flex;align-items:center;gap:6px;font-weight:600}
.nav-bar{background:var(--bg);border-top:0.5px solid var(--border);display:flex;justify-content:space-around;padding:6px 0;flex-shrink:0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;color:var(--text2);cursor:pointer}
.nav-item.active{color:var(--text)}
/* Styles pour la page de login */
#login-page{position:fixed;inset:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;padding:20px}
.login-card{background:var(--bg);padding:30px;border-radius:var(--radius-lg);box-shadow:0 10px 30px rgba(0,0,0,0.1);text-align:center;width:100%;max-width:400px}
</style>
</head>
<body>

<div id="login-page">
  <div class="login-card">
    <div class="logo" style="font-size:24px;margin-bottom:10px">Inventaire <span>Immo</span></div>
    <p style="color:var(--text2);margin-bottom:24px">Veuillez vous connecter pour continuer</p>
    <button class="btn btn-block" onclick="loginGoogle()" style="background:#4285f4;color:#fff;width:100%">
      <i class="ti ti-brand-google"></i> Se connecter avec Google
    </button>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="topbar">
    <div class="logo">Inventaire <span>Immo</span></div>
    <div id="user-area"></div> <div class="topbar-right">
      <button class="btn btn-sm" onclick="syncNow()"><i class="ti ti-refresh"></i></button>
    </div>
  </div>
  
  <div class="content">
    <div class="sidebar" id="sidebar" style="display:none">
      <div class="sidebar-inner">
         <button class="btn btn-block" onclick="logout()"><i class="ti ti-logout"></i> Déconnexion</button>
      </div>
    </div>
    <div class="main" id="main">
      <h1>Bienvenue</h1>
      <p id="welcome-msg">Chargement des données...</p>
    </div>
  </div>

  <div class="nav-bar" id="nav-bar" style="display:none">
    <button class="nav-item active" onclick="goView('home')"><i class="ti ti-home"></i><span>Accueil</span></button>
    <button class="nav-item" onclick="goView('inventory')"><i class="ti ti-clipboard-check"></i><span>Inventaire</span></button>
  </div>
</div>

<script>
// --- CONFIGURATION ---
const USER_NAMES = {
  'mounir.djammal@gmail.com': 'Mounir DJAMMAL',
  'operateurmafintec5@gmail.com': 'Nadir Chaqour'
};

const APP_CLIENT_ID = '248823469190-sumu3o7c0ttd3gfd0lmat9csrro9pc2s.apps.googleusercontent.com';
let googleProfile = null;

// --- LOGIQUE AUTHENTIFICATION ---
function loginGoogle() {
  const root = window.location.origin + window.location.pathname;
  const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${APP_CLIENT_ID}&redirect_uri=${encodeURIComponent(root)}&response_type=token&scope=https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/spreadsheets`;
  window.location.href = url;
}

async function fetchGoogleProfile() {
  const tok = localStorage.getItem('google_token');
  if(!tok) return null;
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
      headers: { Authorization: `Bearer ${tok}` }
    });
    const data = await r.json();
    googleProfile = { name: data.name, email: data.email };
    return googleProfile;
  } catch(e) {
    console.error("Erreur profil:", e);
    return null;
  }
}

// --- LOGIQUE AFFICHAGE ---
function renderUserBadge() {
  const area = document.getElementById('user-area');
  if (!area) return;
  
  let nameToDisplay = "";
  if (googleProfile && googleProfile.email) {
    // Normalisation de l'email pour la recherche (minuscules + suppression espaces)
    const emailKey = googleProfile.email.toLowerCase().trim();
    nameToDisplay = USER_NAMES[emailKey] || googleProfile.name;
  } else if (googleProfile && googleProfile.name) {
    nameToDisplay = googleProfile.name;
  }

  if (nameToDisplay) {
    area.innerHTML = `
      <div class="user-badge">
        <i class="ti ti-user-circle"></i>
        <span>${nameToDisplay}</span>
      </div>`;
  } else {
    area.innerHTML = '';
  }
}

function showAppShell(){
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('nav-bar').style.display='flex';
  
  // CRUCIAL : On dessine le badge dès qu'on affiche l'app
  renderUserBadge(); 
}

function goView(v) {
  const main = document.getElementById('main');
  if(v === 'home') {
    const userName = googleProfile ? (USER_NAMES[googleProfile.email.toLowerCase()] || googleProfile.name) : '';
    main.innerHTML = `<h2>Tableau de bord</h2><p>Bonjour ${userName}</p>`;
  }
}

// --- INITIALISATION ---
async function init(){
  const hash = window.location.hash;
  if(hash.includes('access_token')){
    const params = new URLSearchParams(hash.substring(1));
    const tok = params.get('access_token');
    localStorage.setItem('google_token', tok);
    window.location.hash = ''; 
    
    showAppShell();
    await fetchGoogleProfile();
    renderUserBadge(); // Mise à jour après réception des infos Google
    goView('home');
    return;
  }

  const existingTok = localStorage.getItem('google_token');
  if(existingTok) {
    showAppShell();
    await fetchGoogleProfile();
    renderUserBadge();
    goView('home');
  }
}

function logout() {
  localStorage.removeItem('google_token');
  window.location.reload();
}

window.onload = init;
</script>
</body>
</html>
