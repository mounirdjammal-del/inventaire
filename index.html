async function saveUpd(cbi) {
  const item = findItemByCbi(cbi);
  if (!item) return;
  const trouveEl = document.querySelector('input[name="e-trouve"]:checked');
  const u = { serv: document.getElementById('e-sv').value, renouv: document.getElementById('e-rv').value, obs: document.getElementById('e-obs').value, trouve: trouveEl ? trouveEl.value : '', by: currentUser, ts: Date.now() };

  // ── 1. Vérifier modifications des CARACTÉRISTIQUES (fam, art, marque, modèle, série) ──
  const famEl = document.getElementById('e-fam');
  const artEl = document.getElementById('e-art');
  if (famEl && artEl) {
    const newFam = famEl.value.trim();
    const newArt = artEl.value.trim();
    const newMarque = document.getElementById('e-marque').value.trim();
    const newModele = document.getElementById('e-modele').value.trim();
    const newSerie = document.getElementById('e-serie').value.trim();
    const charChanged = (newFam !== (item.fam || '') || newArt !== (item.art || '') ||
                        newMarque !== (item.marque || '') || newModele !== (item.modele || '') ||
                        newSerie !== (item.serie || ''));
    if (charChanged && newFam && newArt) {
      // Créer la famille si nouvelle
      let famille_id = null;
      for (const fid in REL_FAMS) if (REL_FAMS[fid].famille_nom === newFam) { famille_id = fid; break; }
      if (!famille_id) {
        famille_id = 'F' + String(Object.keys(REL_FAMS).length + 1).padStart(3, '0');
        REL_FAMS[famille_id] = { famille_id, famille_nom: newFam };
        if (!FAMS[newFam]) FAMS[newFam] = [];
        if (gTok) { try { await sAppend('Familles', [[famille_id, newFam]]); } catch(e) {} }
      }
      // Créer l'article si nouveau
      let article_id = null;
      for (const aid in REL_ARTS) if (REL_ARTS[aid].article_nom === newArt && REL_ARTS[aid].famille_id === famille_id) { article_id = aid; break; }
      if (!article_id) {
        article_id = 'A' + String(Object.keys(REL_ARTS).length + 1).padStart(4, '0');
        REL_ARTS[article_id] = { article_id, article_nom: newArt, famille_id, famille_nom: newFam };
        if (!FAMS[newFam].includes(newArt)) FAMS[newFam].push(newArt);
        if (gTok) { try { await sAppend('Articles', [[article_id, newArt, famille_id]]); } catch(e) {} }
      }
      // Mettre à jour l'item
      const oldArt = item.art;
      item.fam = newFam;
      item.art = newArt;
      item.article_id = article_id;
      item.marque = newMarque;
      item.modele = newModele;
      item.serie = newSerie;
      // Tracer
      const charNote = `Caractéristiques modifiées (${oldArt} → ${newArt})`;
      u.obs = u.obs ? u.obs + ' | ' + charNote : charNote;
      // Mettre à jour la table Inventaire dans Sheets (sur la ligne CBI)
      try { await updateInventoryRow(item); } catch(e) { console.error('updateInventoryRow', e); }
      logActivity('EDIT_ITEM', `${oldArt} → ${newArt}${newMarque ? ' / ' + newMarque : ''}${newModele ? ' ' + newModele : ''}`, cbi);
    }
  }

  // ── 2. Vérifier si l'emplacement a changé ──
  const locSel = document.getElementById('e-loc');
  if (locSel && locSel.value !== locSel.dataset.original) {
    const [newSite, newBat, newEtage, newBureau] = locSel.value.split('|');
    const newEmpId = findEmpIdByLocation(newSite, newBat, newEtage, newBureau);
    if (!newEmpId) { showToast('Emplacement introuvable', 'danger'); return; }

    const oldLoc = item.site + ' › ' + item.bat + ' › ' + item.etage + ' › ' + item.bureau;
    // Retirer de l'ancien index
    const oldKey = item.site + '|' + item.bat + '|' + item.etage + '|' + item.bureau;
    if (LOC_INDEX[oldKey]) {
      const idx = LOC_INDEX[oldKey].indexOf(item);
      if (idx >= 0) LOC_INDEX[oldKey].splice(idx, 1);
    }
    // Mettre à jour l'article (emp_id + dénormalisé)
    const newEmp = REL_EMPS[newEmpId];
    item.emp_id = newEmpId;
    item.cbe = newEmp.cbe || item.cbe;
    item.site = newSite; item.bat = newBat; item.etage = newEtage; item.bureau = newBureau;
    // Ajouter au nouvel index
    const newKey = locSel.value;
    if (!LOC_INDEX[newKey]) LOC_INDEX[newKey] = [];
    LOC_INDEX[newKey].push(item);
    // Tracer dans l'observation
    const transferNote = 'TRANSFÉRÉ de ' + oldLoc + ' le ' + new Date().toLocaleDateString('fr-FR');
    u.obs = u.obs ? u.obs + ' | ' + transferNote : transferNote;
  }

  updates[cbi] = u;
  invalidateStatsCache();
  invalidateAllItemsCache();
  saveLocal();
  closeModal();
  renderMain();
  renderDataStatus();
  showToast('✓ Article mis à jour', 'success');

// Gestion des photos en attente pour le nouvel article (avant qu'il ait un CBI)
async function handleNewPhotoCapture(event) {
  const files = [...event.target.files];
  if (!files.length) return;
  if (!window._newItemPhotos) window._newItemPhotos = [];
  // Compresser et stocker en mémoire (Blob)
  for (const file of files) {
    try {
      const compressed = await compressImage(file, 1200, 0.82);
      const previewUrl = URL.createObjectURL(compressed);
      window._newItemPhotos.push({ blob: compressed, previewUrl, name: file.name });
    } catch(e) { console.error('Compression photo', e); }
  }
  renderNewItemPhotoThumbs();
  event.target.value = '';
}

function renderNewItemPhotoThumbs() {
  const wrap = document.getElementById('n-photo-thumbs');
  const cnt = document.getElementById('n-photo-count');
  if (!wrap) return;
  const list = window._newItemPhotos || [];
  if (cnt) cnt.textContent = `(${list.length})`;
  if (!list.length) {
    wrap.innerHTML = '<div class="txt-12-muted">Aucune photo</div>';
    return;
  }
  wrap.innerHTML = list.map((p, i) =>
    `<div style="position:relative;display:inline-block;margin:4px">
      <img src="${p.previewUrl}" alt="photo" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid var(--border)">
      <button onclick="removeNewItemPhoto(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--danger-bg);color:var(--danger-txt);border:none;cursor:pointer;font-size:12px">✕</button>
    </div>`
  ).join('');
}

function removeNewItemPhoto(idx) {
  if (!window._newItemPhotos) return;
  const p = window._newItemPhotos[idx];
  if (p && p.previewUrl) URL.revokeObjectURL(p.previewUrl);
  window._newItemPhotos.splice(idx, 1);
  renderNewItemPhotoThumbs();
}

async function saveNew() {

  // ── RÉFÉRENTIEL : créer Article si nouveau ──
  let article_id = null;
  for (const aid in REL_ARTS) if (REL_ARTS[aid].article_nom === artNom && REL_ARTS[aid].famille_id === famille_id) { article_id = aid; break; }
  if (!article_id) {

async function uploadPhotoToDrive(file, cbi, photoIndex) { const folderId = await ensureDriveFolder(); const ext = file.name.split('.').pop() || 'jpg'; const fname = `${cbi}_${photoIndex}_${Date.now()}.${ext}`; const compressed = await compressImage(file, 1200, 0.82); const boundary = 'inv_boundary_' + Date.now(); const meta = JSON.stringify({ name: fname, parents: [folderId] }); const body = `--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: ${compressed.type}\r\n\r\n`; const bodyEnd = `\r\n--${boundary}--`; const blob = new Blob([body, compressed, bodyEnd]); const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink,webContentLink', { method: 'POST', headers: { Authorization: `Bearer ${gTok}`, 'Content-Type': `multipart/related; boundary=${boundary}` }, body: blob }); if (!r.ok) throw new Error('Erreur upload photo'); const fd = await r.json(); await fetch(`https://www.googleapis.com/drive/v3/files/${fd.id}/permissions`, { method: 'POST', headers: { Authorization: `Bearer ${gTok}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ role: 'reader', type: 'anyone' }) }); return { id: fd.id, viewUrl: `https://drive.google.com/file/d/${fd.id}/view`, thumbUrl: `https://drive.google.com/thumbnail?id=${fd.id}&sz=w400`, name: fname }; }
function compressImage(file, maxW, quality) { return new Promise((res, rej) => { const img = new Image(); const url = URL.createObjectURL(file); img.onload = () => { URL.revokeObjectURL(url); const canvas = document.createElement('canvas'); let w = img.width, h = img.height; if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); canvas.toBlob(b => res(b), 'image/jpeg', quality); }; img.onerror = rej; img.src = url; }); }
async function updatePhotosInSheet(cbi) {
  if (!gTok || !gsConf.sheetId) return;
  const links = (photos[cbi] || []).map(p => p.viewUrl).join('\n');
  const item = findItemByCbi(cbi) || {};
  try {
    const d = await sGet('Updates!A2:A');
    const rows = d.values || [];
    const idx = rows.findIndex(r => r[0] === cbi);
    if (idx >= 0) {
      // Colonne M = photos (13ème colonne)
      await sPut(`Updates!M${idx + 2}`, [[links]]);
    } else {
      const u = updates[cbi] || { serv: 'EN SERVICE', renouv: 'BON', obs: '', by: currentUser, ts: Date.now() };
      await sAppend('Updates', [[cbi, item.emp_id || '', item.cbe || '', item.site || '', item.bat || '', item.etage || '', item.bureau || '', item.art || '', u.serv, u.renouv, u.obs || '', u.trouve || '', links, u.by, new Date(u.ts).toISOString()]]);
    }
  } catch(e) { console.error('Photo sheet update error', e); }
}

// Statut d'un bureau calculé d'après son % d'inventaire
function getBureauStatut(site, bat, etage, bureau) {
  const stats = getStatsFor(site, bat, etage, bureau);
  if (!stats.total) return 'VIDE';
  if (stats.pct === 100) return 'TERMINE';
  if (stats.pct > 0) return 'EN COURS';
  return 'NON OUVERT';
}
function getBureauLastInfo(site, bat, etage, bureau) {
  const items = LOC_INDEX[site + '|' + bat + '|' + etage + '|' + bureau] || [];
  let lastTs = 0, lastBy = '';
  for (const r of items) {
    const u = updates[r.cbi];
    if (u && u.ts > lastTs) { lastTs = u.ts; lastBy = u.by || ''; }
  }
  return { lastTs, lastBy };
}

// Construction de la liste de TOUS les bureaux avec leurs stats
function buildAllBureauData() {
  const data = [];
  for (const site of Object.keys(HIER).sort()) {
    for (const bat of Object.keys(HIER[site]).sort()) {
      for (const etage of Object.keys(HIER[site][bat]).sort()) {
        for (const bureau of HIER[site][bat][etage]) {
          const stats = getStatsFor(site, bat, etage, bureau);
          const statut = getBureauStatut(site, bat, etage, bureau);
          const info = getBureauLastInfo(site, bat, etage, bureau);
          data.push({ site, bat, etage, bureau, stats, statut, lastTs: info.lastTs, lastBy: info.lastBy });
        }
      }
    }
  }
  return data;
}

function renderSuiviList() {
  // Construire la liste filtrée
  let data = buildAllBureauData();
  // Filtre par site
  if (UF.suiviSiteFilter !== 'all') data = data.filter(b => b.site === UF.suiviSiteFilter);

  // Compteurs par statut
  const counts = {
    all: data.length,
    en_cours: data.filter(b => b.statut === 'EN COURS').length,
    non_ouvert: data.filter(b => b.statut === 'NON OUVERT').length,
    termine: data.filter(b => b.statut === 'TERMINE').length
  };

  // Filtre par statut
  let filtered = data;
  if (UF.suiviFilter === 'en_cours') filtered = data.filter(b => b.statut === 'EN COURS');
  else if (UF.suiviFilter === 'non_ouvert') filtered = data.filter(b => b.statut === 'NON OUVERT');
  else if (UF.suiviFilter === 'termine') filtered = data.filter(b => b.statut === 'TERMINE');

  // Filtre par recherche
  if (UF.suiviSearch && UF.suiviSearch.length >= 2) {
    const q = UF.suiviSearch.toLowerCase();
    filtered = filtered.filter(b =>
      (b.bureau + ' ' + b.etage + ' ' + b.bat + ' ' + b.site).toLowerCase().includes(q)
    );
  }

  // Tri : EN COURS par date desc, puis par % asc (les moins avancés d'abord)
  filtered.sort((a, b) => {
    if (a.statut === 'EN COURS' && b.statut === 'EN COURS') return b.lastTs - a.lastTs;
    return a.stats.pct - b.stats.pct;
  });

  // Mettre à jour les boutons filtre avec compteurs
  const filterBtns = document.getElementById('suivi-filter-btns');
  if (filterBtns) {
    const btn = (key, label, color, icon) => {
      const active = UF.suiviFilter === key;
      const cnt = counts[key];
      const bg = active ? `background:${color};color:#fff;border-color:${color}` : '';
      return `<button class="btn btn-sm" style="min-height:34px;font-size:12px;flex:1;min-width:130px;${bg}" onclick="setSuiviFilter('${key}')"><i class="ti ${icon}"></i> ${label} <span style="opacity:.8">(${cnt})</span></button>`;
    };
    filterBtns.innerHTML = [
      btn('en_cours', 'En cours', 'var(--warn-txt)', 'ti-clock'),
      btn('non_ouvert', 'Non inventoriés', '#6b7280', 'ti-circle-dashed'),
      btn('termine', 'Terminés', 'var(--success-txt)', 'ti-circle-check'),
      btn('all', 'Tous', 'var(--accent)', 'ti-layout-grid'),
    ].join('');
  }

  // Rendu de la liste
  const container = document.getElementById('suivi-list-container');
  if (!container) return;

  if (!filtered.length) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text3)">
      <i class="ti ti-filter-off" style="font-size:48px;opacity:.3;display:block;margin-bottom:10px"></i>
      Aucun bureau ne correspond à ce filtre
    </div>`;
    return;
  }

  // Header avec compteur
  const statutLabel = { en_cours: 'en cours', non_ouvert: 'non inventoriés', termine: 'terminés', all: 'au total' }[UF.suiviFilter];
  const headerHTML = `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:600">
    ${filtered.length} bureau${filtered.length > 1 ? 'x' : ''} ${statutLabel}${UF.suiviSiteFilter !== 'all' ? ' à ' + UF.suiviSiteFilter : ''}
  </div>`;

  container.innerHTML = headerHTML + filtered.map(b => bureauCard(b)).join('');
}

    </div>
  </div>`;
}

async function generateExportFinal() {
  if (!DB.length) { showToast("Chargez d'abord les données", 'warn'); return; }
  showToast('Génération export final…', 'info');
  try {
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${gsConf.sheetId}`, { headers: { Authorization: `Bearer ${gTok}` } });
    const meta = await r.json();
    const exist = meta.sheets.map(s => s.properties.title);
    if (!exist.includes(SH_EXPORT)) {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${gsConf.sheetId}:batchUpdate`, { method: 'POST', headers: { Authorization: `Bearer ${gTok}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ requests: [{ addSheet: { properties: { title: SH_EXPORT } } }] }) });
      await sPut(`${SH_EXPORT}!A1`, [H_EXPORT]);
    }
    const all = getAllItems();
    const rows = all.map(r => {
      const u = updates[r.cbi] || {};
      const photoLinks = (photos[r.cbi] || []).map(p => p.viewUrl).join(' | ');
      return [r.site, r.bat, r.etage, r.bureau, r.cbe, r.cbi, r.fam, r.art, r.qty,
        u.serv || r.serv, u.renouv || r.renouv,
        u.obs !== undefined ? u.obs : (r.obs || ''),
        u.trouve || '', r.serie || '', r.modele || '', r.marque || '',
        r.dir || '', r.patrim || '',
        u.by || r.nom_inv || '',
        u.ts ? new Date(u.ts).toLocaleDateString('fr-FR') : '',
        updates[r.cbi] ? 'INVENTORIE' : 'EN ATTENTE',
        r._new ? 'OUI' : 'NON',
        photoLinks];
    });
    for (let i = 0; i < rows.length; i += 500) {
      const batch = rows.slice(i, i + 500);
      await sPut(`${SH_EXPORT}!A${i + 2}:W${i + batch.length + 1}`, batch);
    }
    showToast(`Export final généré : ${rows.length} lignes dans "${SH_EXPORT}"`, 'success');
    logActivity('EXPORT_FINAL', `${rows.length} lignes exportées`, SH_EXPORT);

async function saveEditLocation(btn) {
  const level = btn.dataset.level;
  const oldSite = btn.dataset.site, oldBat = btn.dataset.bat, oldEtage = btn.dataset.etage, oldBureau = btn.dataset.bureau;
  const newName = document.getElementById('el-name').value.trim();
  if (!newName) { showToast('Le nom est requis', 'warn'); return; }

  // ── CONFIRMATION FORTE pour modifications site/bat/etage (impact en cascade) ──
  if (level !== 'bureau') {
    const oldName = level === 'site' ? oldSite : level === 'bat' ? oldBat : oldEtage;
    if (newName !== oldName) {
      const items = getItemsAt(oldSite, level === 'site' ? null : oldBat, (level === 'site' || level === 'bat') ? null : oldEtage, null);
      const count = items.length;
      const labelMap = { site: 'site', bat: 'bâtiment', etage: 'étage' };
      const lbl = labelMap[level];
      // Demander confirmation forte : taper le nom actuel
      const userInput = prompt(
        `⚠ ATTENTION - Modification critique\n\n` +
        `Vous allez renommer le ${lbl} :\n` +
        `   "${oldName}" → "${newName}"\n\n` +
        `Cette modification impactera ${count.toLocaleString('fr-FR')} article(s) ` +
        `et tous les sous-emplacements rattachés.\n\n` +
        `Pour confirmer, tapez exactement le nom actuel :\n"${oldName}"`
      );
      if (userInput !== oldName) {
        if (userInput !== null) showToast('Confirmation invalide — modification annulée', 'warn');
        return;
      }
    }
  }

  let newSite = oldSite, newBat = oldBat, newEtage = oldEtage, newBureau = oldBureau;
  let targetBatId = null;

  if (level === 'site') newSite = newName;
  else if (level === 'bat') newBat = newName;
  else if (level === 'etage') {
    newEtage = newName;
    const batSel = document.getElementById('el-bat');
    if (batSel && batSel.value) newBat = batSel.value;
  } else {
    newBureau = newName;
    const etageSel = document.getElementById('el-etage');
    const batSel = document.getElementById('el-bat');
    if (etageSel && etageSel.value) newEtage = etageSel.value;
    if (batSel && batSel.value) newBat = batSel.value;
  }

  // Détecter si bat de destination a changé
  if (newBat !== oldBat) {
    for (const bid in REL_BATS) {
      const b = REL_BATS[bid];
      const sCode = (REL_SITES[b.site_id] || {}).site_code;
      if (sCode === oldSite && b.bat_nom === newBat) { targetBatId = bid; break; }
    }
  }

  // ───── Mettre à jour directement la table relationnelle correspondante ─────
  let sheetRow = null, sheetRange = '', updateData = [], count = 0;

  try {
    if (level === 'site') {
      // Modifier la ligne dans Sites
      const site_id = findSiteIdByCode(oldSite);
      const sitesArr = Object.keys(REL_SITES);
      const idx = sitesArr.indexOf(site_id);
      if (idx >= 0 && gTok) {
        await sPut(`Sites!B${idx + 2}`, [[newName]]);
        REL_SITES[site_id].site_code = newName;
      }
      // Mettre à jour la dénormalisation dans DB
      for (const r of DB) if (r.site === oldSite) { r.site = newName; count++; }
      for (const r of newItems) if (r.site === oldSite) { r.site = newName; count++; }
      // Mettre à jour siteStatuts
      if (siteStatuts[oldSite]) { siteStatuts[newName] = siteStatuts[oldSite]; delete siteStatuts[oldSite]; }
    }
    else if (level === 'bat') {
      // Modifier la ligne dans Batiments
      let bat_id = null;
      for (const bid in REL_BATS) {
        const b = REL_BATS[bid];
        const sCode = (REL_SITES[b.site_id] || {}).site_code;
        if (sCode === oldSite && b.bat_nom === oldBat) { bat_id = bid; break; }
      }
      const batsArr = Object.keys(REL_BATS);
      const idx = batsArr.indexOf(bat_id);
      if (idx >= 0 && gTok) {
        await sPut(`Batiments!B${idx + 2}`, [[newName]]);
        REL_BATS[bat_id].bat_nom = newName;
      }
      // Dénormalisation
      for (const r of DB) if (r.site === oldSite && r.bat === oldBat) { r.bat = newName; count++; }
      for (const r of newItems) if (r.site === oldSite && r.bat === oldBat) { r.bat = newName; count++; }
    }
    else if (level === 'etage') {
      // Mettre à jour TOUTES les lignes Emplacements du même bâtiment + étage
      const empsToUpdate = [];
      for (const eid in REL_EMPS) {
        const e = REL_EMPS[eid];
        const sCode = (REL_SITES[e.site_id] || {}).site_code;
        const bNom = (REL_BATS[e.bat_id] || {}).bat_nom;
        if (sCode === oldSite && bNom === oldBat && e.etage === oldEtage) {
          empsToUpdate.push(eid);
        }
      }
      if (gTok) {
        const empsArr = Object.keys(REL_EMPS);
        for (const eid of empsToUpdate) {
          const idx = empsArr.indexOf(eid);
          if (idx >= 0) {
            const updates_e = [REL_EMPS[eid].etage = newEtage, REL_EMPS[eid].bureau];
            if (targetBatId) { REL_EMPS[eid].bat_id = targetBatId; }
            await sPut(`Emplacements!D${idx + 2}:E${idx + 2}`, [[REL_EMPS[eid].bat_id, newEtage]]);
          }
        }
      }
      // Dénormalisation
      for (const r of getAllItems()) {
        if (r.site === oldSite && r.bat === oldBat && r.etage === oldEtage) {
          r.etage = newEtage;
          if (newBat !== oldBat) r.bat = newBat;
          count++;
        }
      }
    }
    else { // bureau
      // Modifier 1 seule ligne dans Emplacements
      let emp_id = null;
      for (const eid in REL_EMPS) {
        const e = REL_EMPS[eid];
        const sCode = (REL_SITES[e.site_id] || {}).site_code;
        const bNom = (REL_BATS[e.bat_id] || {}).bat_nom;
        if (sCode === oldSite && bNom === oldBat && e.etage === oldEtage && e.bureau === oldBureau) { emp_id = eid; break; }
      }
      if (emp_id && gTok) {
        const empsArr = Object.keys(REL_EMPS);
        const idx = empsArr.indexOf(emp_id);
        const newBatId = targetBatId || REL_EMPS[emp_id].bat_id;
        await sPut(`Emplacements!D${idx + 2}:F${idx + 2}`, [[newBatId, newEtage, newBureau]]);
        REL_EMPS[emp_id].bat_id = newBatId;
        REL_EMPS[emp_id].etage = newEtage;
        REL_EMPS[emp_id].bureau = newBureau;
      }
      // Dénormalisation
      for (const r of getAllItems()) {
        if (r.site === oldSite && r.bat === oldBat && r.etage === oldEtage && r.bureau === oldBureau) {
          r.bureau = newBureau; r.etage = newEtage; r.bat = newBat;
          count++;
        }
      }
    }
  } catch(e) {
    showToast('Erreur modification: ' + e.message, 'danger');
    console.error(e);
    return;
  }

  saveLocal();
  closeModal();
  buildHier();
  invalidateStatsCache();

  // Si on était dans l'inventaire de ce bureau, mettre à jour curLoc
  if (curLoc.site === oldSite && (level === 'site' || curLoc.bat === oldBat) && (level === 'site' || level === 'bat' || curLoc.etage === oldEtage) && (level !== 'bureau' || curLoc.bureau === oldBureau)) {

    else if (level === 'bat') navigateTo(curLoc.site, newBat, curLoc.etage, curLoc.bureau);
    else if (level === 'etage') navigateTo(curLoc.site, newBat, newEtage, curLoc.bureau);

  logActivity('EDIT_LOCATION', `${labelMap[level]}: renommage (${count} articles)`, `${level}`);
}

}
function alSite() { const v = document.getElementById('al-site').value; document.getElementById('al-site-n').style.display = v === '__n' ? 'block' : 'none'; const bb = document.getElementById('al-bat'); bb.innerHTML = '<option value="">-- Choisir --</option>'; if (v && v !== '__n' && HIER[v]) Object.keys(HIER[v]).sort().forEach(b => bb.innerHTML += `<option>${b}</option>`); bb.innerHTML += '<option value="__n">+ Nouveau bâtiment…</option>'; alBat(); }
function alBat() { const site = document.getElementById('al-site').value, bat = document.getElementById('al-bat').value; document.getElementById('al-bat-n').style.display = bat === '__n' ? 'block' : 'none'; const ee = document.getElementById('al-etage'); ee.innerHTML = '<option value="">-- Choisir --</option>'; if (site && site !== '__n' && bat && bat !== '__n' && HIER[site] && HIER[site][bat]) Object.keys(HIER[site][bat]).sort().forEach(e => ee.innerHTML += `<option>${e}</option>`); ee.innerHTML += '<option value="__n">+ Nouvel étage…</option>'; alEtage(); }
function alEtage() { const site = document.getElementById('al-site').value, bat = document.getElementById('al-bat').value, etage = document.getElementById('al-etage').value; document.getElementById('al-etage-n').style.display = etage === '__n' ? 'block' : 'none'; const bu = document.getElementById('al-bureau'); bu.innerHTML = '<option value="">-- Choisir --</option>'; if (site && site !== '__n' && bat && bat !== '__n' && etage && etage !== '__n' && HIER[site] && HIER[site][bat] && HIER[site][bat][etage]) HIER[site][bat][etage].forEach(b => bu.innerHTML += `<option>${b}</option>`); bu.innerHTML += '<option value="__n">+ Nouveau bureau…</option>'; document.getElementById('al-bureau-n').style.display = 'none'; }
function alBureau() { document.getElementById('al-bureau-n').style.display = document.getElementById('al-bureau').value === '__n' ? 'block' : 'none'; }
async function saveLoc() {
  const site = document.getElementById('al-site').value === '__n' ? document.getElementById('al-site-n').value.trim() : document.getElementById('al-site').value;
  const bat = document.getElementById('al-bat').value === '__n' ? document.getElementById('al-bat-n').value.trim() : document.getElementById('al-bat').value;
  const etage = document.getElementById('al-etage').value === '__n' ? document.getElementById('al-etage-n').value.trim() : document.getElementById('al-etage').value;
  const bureau = document.getElementById('al-bureau').value === '__n' ? document.getElementById('al-bureau-n').value.trim() : document.getElementById('al-bureau').value;
  const cbe = document.getElementById('al-cbe').value.trim();
  const type = document.getElementById('al-type').value.trim();
  if (!site || !bat || !etage || !bureau) { showToast('Tous les champs sont requis', 'warn'); return; }

  try {
    // 1. Créer le site s'il n'existe pas
    let site_id = findSiteIdByCode(site);
    if (!site_id) {
      site_id = 'S' + String(Object.keys(REL_SITES).length + 1).padStart(2, '0');
      REL_SITES[site_id] = { site_id, site_code: site, commune: '' };
      if (gTok) await sAppend('Sites', [[site_id, site, '']]);
    }

    // 2. Créer le bâtiment s'il n'existe pas
    let bat_id = null;
    for (const bid in REL_BATS) {
      if (REL_BATS[bid].site_id === site_id && REL_BATS[bid].bat_nom === bat) { bat_id = bid; break; }
    }
    if (!bat_id) {
      bat_id = 'B' + String(Object.keys(REL_BATS).length + 1).padStart(4, '0');
      REL_BATS[bat_id] = { bat_id, bat_nom: bat, ref_batiment: '', site_id, gps: '', type_bat: '', direction: '' };
      if (gTok) await sAppend('Batiments', [[bat_id, bat, '', site_id, '', '', '']]);
    }

    // 3. Créer l'emplacement
    let emp_id = null;
    for (const eid in REL_EMPS) {
      const e = REL_EMPS[eid];
      if (e.bat_id === bat_id && e.etage === etage && e.bureau === bureau) { emp_id = eid; break; }
    }
    if (!emp_id) {
      emp_id = 'E' + String(Object.keys(REL_EMPS).length + 1).padStart(5, '0');
      REL_EMPS[emp_id] = { emp_id, cbe, site_id, bat_id, etage, bureau, type_empl: type };
      if (gTok) await sAppend('Emplacements', [[emp_id, cbe, site_id, bat_id, etage, bureau, type]]);
    } else {
      showToast('Cet emplacement existe déjà', 'warn');
      return;
    }

    // Mettre à jour la hiérarchie locale
    if (!HIER[site]) HIER[site] = {};
    if (!HIER[site][bat]) HIER[site][bat] = {};
    if (!HIER[site][bat][etage]) HIER[site][bat][etage] = [];
    if (!HIER[site][bat][etage].includes(bureau)) HIER[site][bat][etage].push(bureau);
    HIER[site][bat][etage].sort();
    // Rafraîchir le sélecteur de site (si nouveau site)
    const ss = document.getElementById('sel-site');
    if (ss) {
      const currentVal = ss.value;
      ss.innerHTML = '<option value="">-- Site --</option>' + Object.keys(HIER).sort().map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
      if (currentVal) ss.value = currentVal;
    }

    saveLocal();
    closeModal();
    invalidateStatsCache();
    showToast(`Emplacement ${bureau} créé`, 'success');
    logActivity('ADD_LOCATION', `${site} › ${bat} › ${etage} › ${bureau}`, emp_id);
    if (currentView === 'locations') renderLocationsView();
    else renderMain();
  } catch(e) {
    showToast('Erreur création: ' + e.message, 'danger');
    console.error(e);
  }
}

// ---------- INIT ----------
function showAppShell() {
  const lp = document.getElementById('login-page');
  if (lp) lp.style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('sidebar').style.display = 'none';
}
function init() {
  loadLocal();
  loadPhotos();

  // ── Écouter les changements de connectivité réseau ──
  window.addEventListener('online', () => {
    renderPendingIndicator();
    if (gTok && pendingWrites.length) {
      showToast('Connexion rétablie — synchronisation…', 'info');
      pushPending().then(() => {
        if (typeof syncNow === 'function') syncNow();
      });
    } else if (gTok) {
      showToast('Connexion rétablie', 'success');
    }
  });
  window.addEventListener('offline', () => {
    renderPendingIndicator();
    showToast('Mode hors-ligne — les modifications seront synchronisées au retour', 'warn');
  });
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    const p = new URLSearchParams(hash.slice(1));
    const tok = p.get('access_token');
    const exp = parseInt(p.get('expires_in') || '3600');
    if (tok) {
      history.replaceState(null, '', window.location.pathname + window.location.search);
      setToken(tok, exp);
      showAppShell();
      updateBadge('ok');
      const syncBtn = document.getElementById('btn-sync');
      if (syncBtn) syncBtn.style.display = 'flex';
      (async () => {
        await fetchGoogleProfile();
        renderUserBadge();
        renderTopbarActions();
        renderDataStatus();
        await loadFromSheets();
        renderUserBadge();
        logActivity('LOGIN', `Connexion Google (${googleProfile.email || ''})`, '');
      })();
      return;
    }
  }
  if (restoreToken()) {
    restoreProfile();
    if (googleProfile.name) {
      currentUser = googleProfile.name;
      showAppShell();
      updateBadge('ok');
      const syncBtn = document.getElementById('btn-sync');
      if (syncBtn) syncBtn.style.display = 'flex';
      renderUserBadge();
      renderTopbarActions();
      renderDataStatus();
      goView('inventory');
      loadFromSheets();
      return;
    }
  }
  // Afficher la page de connexion
  document.getElementById('login-page').style.display = 'flex';
}
init();
</script>
